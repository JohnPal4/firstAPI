<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory API UI</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: #fff;
    padding: 20px;
}

h1 { color: #4CAF50; }

.section {
    border: 1px solid #444;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 8px;
    background: #2a2a2a;
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 4px;
    border: none;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.get { background: #2196F3; }
.post { background: #4CAF50; }
.put { background: #FFC107; color: black; }
.patch { background: #9C27B0; }
.delete { background: #F44336; }

pre {
    background: #000;
    padding: 10px;
    overflow-x: auto;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>Inventory Interface</h1>

<!-- CREATE -->
<div class="section">
<h2>POST /inventory</h2>
<input id="material_id" placeholder="Material ID (int)">
<input id="material_name" placeholder="Material Name">
<input id="purchase_date" placeholder="YYYY-MM-DD">
<input id="purchase_quantity" placeholder="Purchase Quantity">
<input id="storage_location" placeholder="Storage Location">
<input id="on_hand_quantity" placeholder="On Hand Quantity">
<button class="post" onclick="createItem()">Create</button>
</div>

<!-- GET -->
<div class="section">
<h2>GET /inventory</h2>
<button class="get" onclick="getItems()">Fetch All</button>

<h3>GET /inventory/{material_id}</h3>
<input id="get-id" placeholder="Material ID">
<button class="get" onclick="getItem()">Fetch One</button>
</div>

<!-- PUT -->
<div class="section">
<h2>PUT /inventory/{material_id}</h2>
<input id="put-id" placeholder="Material ID">
<input id="put-name" placeholder="Material Name">
<input id="put-date" placeholder="YYYY-MM-DD">
<input id="put-qty" placeholder="Purchase Quantity">
<input id="put-location" placeholder="Storage Location">
<input id="put-onhand" placeholder="On Hand Quantity">
<button class="put" onclick="updateItem()">Replace</button>
</div>

<!-- PATCH -->
<div class="section">
<h2>PATCH /inventory/{material_id}</h2>
<input id="patch-id" placeholder="Material ID">
<input id="patch-name" placeholder="Material Name">
<input id="patch-qty" placeholder="Purchase Quantity">
<input id="patch-onhand" placeholder="On Hand Quantity">
<button class="patch" onclick="patchItem()">Update</button>
</div>

<!-- DELETE -->
<div class="section">
<h2>DELETE /inventory/{material_id}</h2>
<input id="delete-id" placeholder="Material ID">
<button class="delete" onclick="deleteItem()">Delete</button>
</div>

<!-- OUTPUT -->
<div class="section">
<h2>Response</h2>
<pre id="output">No requests yet...</pre>
</div>

<script>
const API = "/inventory";

function showResponse(status, data) {
    document.getElementById("output").textContent =
        "Status: " + status + "\n\n" +
        JSON.stringify(data, null, 2);
}

async function handleRequest(url, options = {}) {
    try {
        const res = await fetch(url, options);
        const text = await res.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            data = text;
        }

        showResponse(res.status, data);

    } catch (err) {
        showResponse("ERROR", err.message);
    }
}

// CREATE
function createItem() {
    handleRequest(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            material_id: parseInt(document.getElementById("material_id").value),
            material_name: document.getElementById("material_name").value,
            purchase_date: document.getElementById("purchase_date").value || null,
            purchase_quantity: parseInt(document.getElementById("purchase_quantity").value),
            storage_location: document.getElementById("storage_location").value,
            on_hand_quantity: parseInt(document.getElementById("on_hand_quantity").value)
        })
    });
}

// GET ALL
function getItems() {
    handleRequest(API);
}

// GET ONE
function getItem() {
    const id = document.getElementById("get-id").value;
    handleRequest(`${API}/${id}`);
}

// PUT
function updateItem() {
    const id = document.getElementById("put-id").value;

    handleRequest(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            material_id: parseInt(id),
            material_name: document.getElementById("put-name").value,
            purchase_date: document.getElementById("put-date").value || null,
            purchase_quantity: parseInt(document.getElementById("put-qty").value),
            storage_location: document.getElementById("put-location").value,
            on_hand_quantity: parseInt(document.getElementById("put-onhand").value)
        })
    });
}

// PATCH
function patchItem() {
    const id = document.getElementById("patch-id").value;

    const body = {};
    if (document.getElementById("patch-name").value)
        body.material_name = document.getElementById("patch-name").value;

    if (document.getElementById("patch-qty").value)
        body.purchase_quantity = parseInt(document.getElementById("patch-qty").value);

    if (document.getElementById("patch-onhand").value)
        body.on_hand_quantity = parseInt(document.getElementById("patch-onhand").value);

    handleRequest(`${API}/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });
}

// DELETE
function deleteItem() {
    const id = document.getElementById("delete-id").value;

    handleRequest(`${API}/${id}`, {
        method: "DELETE"
    });
}
</script>

</body>
</html>
